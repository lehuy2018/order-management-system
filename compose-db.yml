version: '3.8'

services:
  postgres:
    image: 'postgres:16.3'
    container_name: my_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: order-management
      TZ: Asia/Ho_Chi_Minh
      # Nếu muốn ép PostgreSQL dùng timezone này:
      PGTZ: Asia/Ho_Chi_Minh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: